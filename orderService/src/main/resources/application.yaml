spring:
  application:
    name: orderService
# dataBase
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
  datasource:
    username: sa
    password: sa
    url: jdbc:h2:mem:test
  h2:
    console:
      enabled: true
    path: /h2
#---db props end---

#---kafka-producer-start---
  kafka:
    # Kafka broker address - where Kafka cluster is running
    bootstrap-servers: localhost:9092
    topic:
      name: order-events
    # ===== PRODUCER CONFIG (OrderProducer Service) =====
    producer:
      # Serializes Long orderId to bytes - ensures key is consistently typed
      key-serializer: org.apache.kafka.common.serialization.LongSerializer
      # Serializes OrderEvent object to JSON bytes - human-readable messages in Kafka
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      # acks=all: Wait for ALL in-sync replicas to acknowledge before returning
      # Guarantees: Message won't be lost even if broker fails (DURABILITY)
      acks: all
      # Enables idempotent producer: prevents duplicate messages even if producer retries
      # Guarantees: Exactly-once semantics at PRODUCER level
      enable-idempotence: true
      # Retry failed sends up to 3 times before giving up
      # Provides: Resilience against temporary network failures
      retries: 3
      properties:
        # Wait up to 10ms to batch multiple messages together
        # Benefit: Better throughput (fewer network round-trips)
        linger.ms: 10
        # Batch messages up to 16KB before sending
        # Benefit: Efficiency - reduces overhead of individual sends
        batch.size: 16384
        # Setting header to false so that deserialization can happen even with eventModel in different package
        spring.json.add.type.headers: false

server:
  port: 8085